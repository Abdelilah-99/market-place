services:
  media-service-mongodb:
    build:
      context: ./database
      dockerfile: dockerfile
    container_name: media-service-mongodb
    env_file:
      - .env.media
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net
    logging: &bounded-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  media-service:
    build:
      context: ../
      dockerfile: ./media-service/media/Dockerfile
    container_name: media-service
    env_file:
      - .env.media
    depends_on:
      - media-service-mongodb
    volumes:
      - media-service-certs:/app/resources/certs:ro
      - media_storage:/storage
    networks:
      - shared-net
    logging: *bounded-logging

volumes:
  mongo_data:
    name: media-service_mongo_data
    external: true
  media_storage:
    name: media-service_media_storage
    external: true
  media-service-certs:
    external: true

networks:
  shared-net:
    external: true
