services:
  media-service-mongodb:
    build:
      context: ./database
      dockerfile: dockerfile
    container_name: media-service-mongodb
    env_file:
      - .env.media
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net

  media-service:
    build:
      context: ../
      dockerfile: ./media-service/media/Dockerfile
    container_name: media-service
    ports:
      - "8888:8888"
    env_file:
      - .env.media
    depends_on:
      - media-service-mongodb
    volumes:
      # - media_m2:/root/.m2
      - media-service-certs:/app/resources/certs:ro
      - /home/ubuntu/.m2:/root/.m2
      # - ./certs/media-service.p12:/app/resources/certs/media-service.p12:ro
      # - ./certs/truststore.p12:/app/resources/certs/truststore.p12:ro
    networks:
      - shared-net

volumes:
  mongo_data:
  media_m2:
  media-service-certs:
    external: true

networks:
  shared-net:
    external: true
