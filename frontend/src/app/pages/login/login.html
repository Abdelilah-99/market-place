<app-section background="zellige" padding="xl" class="min-h-[80vh] flex items-center">
  <div class="max-w-md mx-auto w-full bg-white rounded-xl shadow-elevation-premium border border-primary/10 overflow-hidden">
    <!-- Header Decor -->
    <div class="h-2 bg-primary"></div>
    
    <div class="p-8 md:p-12">
      <div class="text-center mb-10">
        <app-typography variant="h2" [serif]="true" customClass="text-accent mb-2">Welcome Back</app-typography>
        <app-typography variant="body" customClass="text-accent/60">Sign in to continue your journey through Moroccan crafts.</app-typography>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="space-y-6" novalidate>
        <div class="space-y-2">
          <app-typography variant="caption" customClass="uppercase tracking-widest font-black text-primary">Username or Email</app-typography>
          <input id="identification" name="identification" type="text" [(ngModel)]="user.identification" required
            minlength="3" placeholder="Enter your identification" 
            class="w-full px-4 py-3 rounded-lg border border-primary/10 bg-background/30 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-sans text-accent" />
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <app-typography variant="caption" customClass="uppercase tracking-widest font-black text-primary">Password</app-typography>
            <a href="#" class="text-[10px] font-black uppercase tracking-widest text-primary/60 hover:text-primary">Forgot?</a>
          </div>
          <input id="password" name="password" type="password" [(ngModel)]="user.password" required minlength="6"
            placeholder="••••••••" 
            class="w-full px-4 py-3 rounded-lg border border-primary/10 bg-background/30 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-sans text-accent" />
        </div>

        <app-button type="submit" [fullWidth]="true" [disabled]="!!isSubmitting() || loginForm.invalid">
          {{ isSubmitting() ? 'Signing in...' : 'Sign In' }}
        </app-button>
      </form>

      @if (message) {
        <div class="mt-6 p-4 bg-green-50 border border-green-100 rounded-lg">
          <app-typography variant="caption" customClass="text-green-600 font-bold text-center block">{{ message }}</app-typography>
        </div>
      }

      @if (errorMessage()) {
        <div class="mt-6 p-4 bg-red-50 border border-red-100 rounded-lg">
          <app-typography variant="caption" customClass="text-red-600 font-bold text-center block">{{ errorMessage() }}</app-typography>
        </div>
      }

      <div class="mt-10 pt-8 border-t border-primary/5 text-center">
        <app-typography variant="body" customClass="text-accent/60">
          Don't have an account? 
          <a routerLink="/register" class="text-primary font-bold hover:underline">Register</a>
        </app-typography>
      </div>
    </div>
  </div>
</app-section>
