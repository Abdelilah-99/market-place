<app-section background="zellige" padding="xl" class="min-h-[80vh] flex items-center justify-center text-center">
    <div class="max-w-md mx-auto">
        <p class="font-serif text-primary text-8xl md:text-9xl leading-none mb-2">404</p>
        <div class="w-16 rule-gold mx-auto mb-6"></div>
        <app-typography variant="h3" [serif]="true" customClass="text-accent mb-5">Lost in the Souk</app-typography>
        <p class="font-sans text-muted leading-relaxed mb-10">
            The treasure you are looking for has vanished into the winds of the Sahara.
            Let us find our way back to the main collection.
        </p>
        <app-button variant="primary" [routerLink]="['/']">Back to Marketplace</app-button>
    </div>
</app-section>
