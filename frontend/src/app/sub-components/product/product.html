<article class="product-card">
  <div class="product-media">
    <img [src]="imagePreview() || (product.image ? '/api/media/products/' + product.image : '')"
      [alt]="product.name" />
    <span class="condition-pill">Available</span>
    @if (isEditing) {
    <button class="media-edit-button" (click)="fileInput.click()" aria-label="Change product image">
      <i class="fa fa-camera"></i>
    </button>
    <input type="file" #fileInput class="hidden" (change)="onImageSelected($event)" accept="image/*" />
    }
  </div>

  <div class="product-body">
    @if (!isEditing) {
    <div>
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
    </div>
    <div class="price-row">
      <strong>${{ product.price }}</strong>
      <span>Ready to ship</span>
    </div>
    } @else {
    <div class="edit-fields">
      <label class="form-field">
        <span>Name</span>
        <input type="text" [(ngModel)]="updatedProduct.name" />
      </label>
      <label class="form-field">
        <span>Description</span>
        <textarea [(ngModel)]="updatedProduct.description" rows="3"></textarea>
      </label>
      <div class="form-field price-input">
        <label>Price</label>
        <div>
          <span>$</span>
          <input type="number" [(ngModel)]="updatedProduct.price" />
        </div>
      </div>
    </div>
    }
  </div>

  <div class="product-actions">
    @if (!isMyProduct) {
    <button class="btn-primary buy-button">
      <i class="fa fa-bag-shopping"></i>
      Buy now
    </button>
    }

    @if (isMyProduct) {
    <div class="seller-actions">
      @if (!isEditing) {
      <button (click)="isEditing = true" class="icon-button" aria-label="Edit product">
        <i class="fa fa-pencil"></i>
      </button>
      <button (click)="delete()" class="icon-button danger" aria-label="Delete product">
        <i class="fa fa-trash"></i>
      </button>
      } @else {
      <button (click)="cancel()" class="btn-secondary compact">
        <i class="fa fa-xmark"></i>
        Cancel
      </button>
      <button (click)="save()" class="btn-primary compact">
        <i class="fa fa-check"></i>
        Save
      </button>
      }
    </div>
    }
  </div>
</article>
