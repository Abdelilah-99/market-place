<nav class="sticky top-0 z-[100] bg-background/80 backdrop-blur-md border-b border-primary/10 shadow-elevation-1">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">

      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <a routerLink="/" class="group flex items-center gap-2">
          <div class="w-10 h-10 bg-primary rounded-sm flex items-center justify-center rotate-45 group-hover:rotate-90 transition-transform duration-500 shadow-elevation-1">
            <span class="text-white font-serif font-black text-xl -rotate-45 group-hover:-rotate-90 transition-transform duration-500">M</span>
          </div>
          <span class="text-2xl font-serif font-black text-accent tracking-tighter ml-2 rtl:mr-2 rtl:ml-0">Marketo</span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8 rtl:space-x-reverse">
        <!-- Search bar (placeholder for now) -->
        <div class="relative w-64">
           <input type="text" placeholder="Search crafts..." class="w-full bg-accent/5 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-primary/20 transition-all">
        </div>

        <div class="flex items-center space-x-6 rtl:space-x-reverse">
          @if (!isAuthenticated()) {
            <a routerLink="/login" class="text-accent hover:text-primary font-semibold text-sm transition-colors">Login</a>
            <a routerLink="/register" class="bg-primary text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-elevation-1 hover:shadow-elevation-premium transition-all">Register</a>
          } @else {
            @if (isSeller()) {
              <a routerLink="/dashboard" class="text-accent hover:text-primary font-semibold text-sm transition-colors">Dashboard</a>
            }
            <a routerLink="/profile" class="relative group">
              <img [src]="profileAvatarSrc() || 'avatar.jpeg'" alt="Profile" class="h-10 w-10 rounded-full border-2 border-primary/20 group-hover:border-primary transition-colors object-cover shadow-sm">
            </a>
            <button (click)="logout()" class="text-accent/60 hover:text-red-500 font-semibold text-sm transition-colors cursor-pointer">Logout</button>
          }

          <!-- Language & Currency Switchers -->
          <div class="flex items-center gap-6">
            <!-- Language -->
            <div class="relative">
              <button (click)="toggleLangMenu()" class="flex items-center gap-1 text-accent hover:text-primary font-black text-[10px] tracking-widest uppercase transition-colors">
                {{ currentLang() }}
                <svg class="w-3 h-3 transition-transform" [class.rotate-180]="isLangMenuOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div *ngIf="isLangMenuOpen" class="absolute right-0 rtl:left-0 rtl:right-auto mt-3 w-40 bg-white shadow-elevation-premium rounded-xl py-3 border border-primary/5 z-[110]">
                <button (click)="setLang('en')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentLang() === 'en'">
                  <span>English</span>
                  <span *ngIf="currentLang() === 'en'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setLang('fr')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentLang() === 'fr'">
                  <span>Français</span>
                  <span *ngIf="currentLang() === 'fr'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setLang('ar')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors font-serif" [class.text-primary]="currentLang() === 'ar'">
                  <span>العربية</span>
                  <span *ngIf="currentLang() === 'ar'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
              </div>
            </div>

            <!-- Currency -->
            <div class="relative">
              <button (click)="toggleCurrencyMenu()" class="flex items-center gap-1 text-accent hover:text-primary font-black text-[10px] tracking-widest uppercase transition-colors">
                {{ currentCurrency() }}
                <svg class="w-3 h-3 transition-transform" [class.rotate-180]="isCurrencyMenuOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div *ngIf="isCurrencyMenuOpen" class="absolute right-0 rtl:left-0 rtl:right-auto mt-3 w-40 bg-white shadow-elevation-premium rounded-xl py-3 border border-primary/5 z-[110]">
                <button (click)="setCurrency('MAD')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentCurrency() === 'MAD'">
                  <span>MAD (Dirham)</span>
                  <span *ngIf="currentCurrency() === 'MAD'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setCurrency('EUR')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentCurrency() === 'EUR'">
                  <span>EUR (Euro)</span>
                  <span *ngIf="currentCurrency() === 'EUR'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setCurrency('USD')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentCurrency() === 'USD'">
                  <span>USD (Dollar)</span>
                  <span *ngIf="currentCurrency() === 'USD'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center gap-4">
        <button (click)="toggleMenu()" class="text-accent p-2 hover:bg-accent/5 rounded-lg transition-colors">
          <svg *ngIf="!isOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          <svg *ngIf="isOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isOpen" class="md:hidden bg-white border-t border-primary/5 shadow-elevation-premium py-4 px-4 space-y-4">
    @if (!isAuthenticated()) {
      <a routerLink="/login" class="block w-full text-center py-3 text-accent font-semibold border border-accent/10 rounded-lg">Login</a>
      <a routerLink="/register" class="block w-full text-center py-3 bg-primary text-white font-bold rounded-lg shadow-elevation-1">Register</a>
    } @else {
      @if (isSeller()) {
        <a routerLink="/dashboard" class="block py-2 text-accent font-semibold">Dashboard</a>
      }
      <a routerLink="/profile" class="block py-2 text-accent font-semibold">Profile</a>
      <button (click)="logout()" class="block w-full text-left py-2 text-red-500 font-semibold">Logout</button>
    }
    <div class="pt-4 border-t border-accent/5 flex justify-around">
      <button (click)="setLang('en')" [class.text-primary]="currentLang() === 'en'" class="text-xs font-black uppercase tracking-widest">EN</button>
      <button (click)="setLang('fr')" [class.text-primary]="currentLang() === 'fr'" class="text-xs font-black uppercase tracking-widest">FR</button>
      <button (click)="setLang('ar')" [class.text-primary]="currentLang() === 'ar'" class="text-xs font-black uppercase tracking-widest">AR</button>
    </div>
  </div>
</nav>
