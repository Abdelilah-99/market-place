<nav class="sticky top-0 z-[100] bg-background/85 backdrop-blur-md border-b border-line">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">

      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <a routerLink="/" class="group flex items-center gap-3">
          <span class="w-9 h-9 border border-secondary/70 rotate-45 flex items-center justify-center group-hover:border-primary transition-colors duration-500">
            <span class="-rotate-45 font-serif text-primary text-lg group-hover:text-primary-dark transition-colors">M</span>
          </span>
          <span class="text-2xl font-serif text-accent tracking-tight">Marketo</span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-8 rtl:space-x-reverse">
        <a routerLink="/shop" class="eyebrow text-accent/70 hover:text-primary transition-colors">Shop</a>
        <a routerLink="/shop" class="eyebrow text-accent/70 hover:text-primary transition-colors">Artisans</a>

        <!-- Search bar -->
        <div class="relative w-56">
          <svg class="absolute left-3 rtl:right-3 rtl:left-auto top-1/2 -translate-y-1/2 w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" placeholder="Search crafts..." class="w-full bg-surface border border-line rounded-sm ps-9 pe-4 py-2 text-sm placeholder:text-muted focus:border-primary/40 focus:ring-0 transition-all">
        </div>

        <div class="flex items-center gap-6 rtl:space-x-reverse">
          @if (!isAuthenticated()) {
            <a routerLink="/login" class="eyebrow text-accent/70 hover:text-primary transition-colors">Login</a>
            <a routerLink="/register" class="bg-primary text-white px-5 py-2.5 rounded-sm text-xs font-semibold tracking-wide hover:bg-primary-dark transition-all">Register</a>
          } @else {
            @if (isSeller()) {
              <a routerLink="/dashboard" class="eyebrow text-accent/70 hover:text-primary transition-colors">Dashboard</a>
            }
            <a routerLink="/profile" class="relative group">
              <img [src]="profileAvatarSrc() || 'avatar.jpeg'" alt="Profile" class="h-9 w-9 rounded-full border border-secondary/50 group-hover:border-primary transition-colors object-cover">
            </a>
            <button (click)="logout()" class="eyebrow text-accent/50 hover:text-primary transition-colors cursor-pointer">Logout</button>
          }

          <!-- Language & Currency Switchers -->
          <div class="flex items-center gap-5 ps-5 border-s border-line">
            <!-- Language -->
            <div class="relative">
              <button (click)="toggleLangMenu()" class="flex items-center gap-1 text-accent/70 hover:text-primary eyebrow transition-colors">
                {{ currentLang() }}
                <svg class="w-3 h-3 transition-transform" [class.rotate-180]="isLangMenuOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div *ngIf="isLangMenuOpen" class="absolute right-0 rtl:left-0 rtl:right-auto mt-3 w-40 bg-surface shadow-elevation-premium rounded-sm py-2 border border-line z-[110]">
                <button (click)="setLang('en')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentLang() === 'en'">
                  <span>English</span>
                  <span *ngIf="currentLang() === 'en'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setLang('fr')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentLang() === 'fr'">
                  <span>Français</span>
                  <span *ngIf="currentLang() === 'fr'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setLang('ar')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors font-serif" [class.text-primary]="currentLang() === 'ar'">
                  <span>العربية</span>
                  <span *ngIf="currentLang() === 'ar'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
              </div>
            </div>

            <!-- Currency -->
            <div class="relative">
              <button (click)="toggleCurrencyMenu()" class="flex items-center gap-1 text-accent/70 hover:text-primary eyebrow transition-colors">
                {{ currentCurrency() }}
                <svg class="w-3 h-3 transition-transform" [class.rotate-180]="isCurrencyMenuOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div *ngIf="isCurrencyMenuOpen" class="absolute right-0 rtl:left-0 rtl:right-auto mt-3 w-44 bg-surface shadow-elevation-premium rounded-sm py-2 border border-line z-[110]">
                <button (click)="setCurrency('MAD')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentCurrency() === 'MAD'">
                  <span>MAD (Dirham)</span>
                  <span *ngIf="currentCurrency() === 'MAD'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setCurrency('EUR')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentCurrency() === 'EUR'">
                  <span>EUR (Euro)</span>
                  <span *ngIf="currentCurrency() === 'EUR'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
                <button (click)="setCurrency('USD')" class="flex items-center justify-between w-full px-5 py-2.5 text-sm hover:bg-background transition-colors" [class.text-primary]="currentCurrency() === 'USD'">
                  <span>USD (Dollar)</span>
                  <span *ngIf="currentCurrency() === 'USD'" class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center gap-2">
        <a routerLink="/shop" aria-label="Search" class="text-accent p-2 hover:text-primary transition-colors">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </a>
        <button (click)="toggleMenu()" aria-label="Menu" class="text-accent p-2 hover:text-primary transition-colors">
          <svg *ngIf="!isOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7h16M4 12h16M4 17h16"></path></svg>
          <svg *ngIf="isOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isOpen" class="md:hidden bg-surface border-t border-line shadow-elevation-premium">
    <div class="px-5 py-6 space-y-5">
      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-3 rtl:right-3 rtl:left-auto top-1/2 -translate-y-1/2 w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" placeholder="Search crafts..." class="w-full bg-background border border-line rounded-sm ps-9 pe-4 py-2.5 text-sm placeholder:text-muted focus:border-primary/40 focus:ring-0">
      </div>

      <!-- Primary links -->
      <nav class="flex flex-col">
        <a routerLink="/shop" (click)="toggleMenu()" class="flex items-center justify-between py-3 border-b border-line text-accent font-serif text-lg">
          Shop <span class="text-muted text-sm rtl:rotate-180">&rarr;</span>
        </a>
        <a routerLink="/shop" (click)="toggleMenu()" class="flex items-center justify-between py-3 border-b border-line text-accent font-serif text-lg">
          Artisans <span class="text-muted text-sm rtl:rotate-180">&rarr;</span>
        </a>
      </nav>

      <!-- Account -->
      @if (!isAuthenticated()) {
        <div class="space-y-3 pt-1">
          <a routerLink="/login" (click)="toggleMenu()" class="block w-full text-center py-3 text-accent font-semibold text-sm tracking-wide border border-line rounded-sm">Login</a>
          <a routerLink="/register" (click)="toggleMenu()" class="block w-full text-center py-3 bg-primary text-white font-semibold text-sm tracking-wide rounded-sm">Register</a>
        </div>
      } @else {
        <div class="flex flex-col pt-1">
          @if (isSeller()) {
            <a routerLink="/dashboard" (click)="toggleMenu()" class="py-3 border-b border-line text-accent font-semibold">Dashboard</a>
          }
          <a routerLink="/profile" (click)="toggleMenu()" class="py-3 border-b border-line text-accent font-semibold">Profile</a>
          <button (click)="logout()" class="text-left py-3 text-primary font-semibold">Logout</button>
        </div>
      }

      <!-- Language & Currency -->
      <div class="pt-2 grid grid-cols-2 gap-4">
        <div>
          <p class="eyebrow text-muted mb-2">Language</p>
          <div class="flex gap-4">
            <button (click)="setLang('en')" [class.text-primary]="currentLang() === 'en'" class="eyebrow text-accent/60">EN</button>
            <button (click)="setLang('fr')" [class.text-primary]="currentLang() === 'fr'" class="eyebrow text-accent/60">FR</button>
            <button (click)="setLang('ar')" [class.text-primary]="currentLang() === 'ar'" class="eyebrow text-accent/60">AR</button>
          </div>
        </div>
        <div>
          <p class="eyebrow text-muted mb-2">Currency</p>
          <div class="flex gap-4">
            <button (click)="setCurrency('MAD')" [class.text-primary]="currentCurrency() === 'MAD'" class="eyebrow text-accent/60">MAD</button>
            <button (click)="setCurrency('EUR')" [class.text-primary]="currentCurrency() === 'EUR'" class="eyebrow text-accent/60">EUR</button>
            <button (click)="setCurrency('USD')" [class.text-primary]="currentCurrency() === 'USD'" class="eyebrow text-accent/60">USD</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
