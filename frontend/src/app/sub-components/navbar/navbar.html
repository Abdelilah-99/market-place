<nav class="market-nav">
  <div class="nav-inner">
    <a routerLink="/" class="brand" aria-label="Marketo home">
      <span class="brand-mark">M</span>
      <span class="brand-copy">
        <strong>Marketo</strong>
        <small>Local marketplace</small>
      </span>
    </a>

    <div class="nav-search" aria-label="Search preview">
      <i class="fa fa-magnifying-glass"></i>
      <span>Search products, sellers, deals</span>
    </div>

    <div class="desktop-actions">
      @if (isSeller()) {
      <a routerLink="/dashboard" class="nav-link">Dashboard</a>
      }

      @if (!isAuthenticated()) {
      <a routerLink="/login" class="nav-link">Login</a>
      <a routerLink="/register" class="nav-cta">Register</a>
      } @else {
      <a routerLink="/profile" class="profile-link" aria-label="Open profile">
        @if (profileAvatarSrc()) {
        <img [src]="profileAvatarSrc()" alt="Profile" />
        } @else {
        <i class="fa fa-user"></i>
        }
      </a>
      <button (click)="logout()" class="logout-btn">Logout</button>
      }
    </div>

    <button (click)="toggleMenu()" class="menu-button" aria-label="Toggle menu">
      <i [class]="isOpen ? 'fa fa-xmark' : 'fa fa-bars'"></i>
    </button>
  </div>

  @if (isOpen) {
  <div class="mobile-menu">
    @if (isSeller()) {
    <a routerLink="/dashboard" (click)="toggleMenu()">Dashboard</a>
    }
    @if (!isAuthenticated()) {
    <a routerLink="/login" (click)="toggleMenu()">Login</a>
    <a routerLink="/register" (click)="toggleMenu()">Register</a>
    } @else {
    <a routerLink="/profile" (click)="toggleMenu()">Profile</a>
    <button (click)="logout()">Logout</button>
    }
  </div>
  }
</nav>
