<div class="modal-backdrop" (click)="close()">
  <section class="product-modal" (click)="$event.stopPropagation()" aria-label="Create product">
    <header class="modal-header">
      <div>
        <span class="section-kicker">New listing</span>
        <h2>Create product</h2>
      </div>
      <button type="button" class="icon-close" (click)="close()" aria-label="Close modal">
        <i class="fa fa-xmark"></i>
      </button>
    </header>

    <form (ngSubmit)="createProduct()" #productForm="ngForm" class="modal-form">
      <label class="form-field">
        <span>Product name</span>
        <input type="text" name="name" [(ngModel)]="product.name" required placeholder="Enter product name" />
      </label>

      <label class="form-field">
        <span>Description</span>
        <textarea name="description" [(ngModel)]="product.description" required rows="3"
          placeholder="Describe condition, features, and delivery details"></textarea>
      </label>

      <div class="form-grid">
        <label class="form-field">
          <span>Category</span>
          <select name="category" [(ngModel)]="product.category" required>
            <option value="" disabled>Select category</option>
            <option *ngFor="let category of categories" [value]="category.toLowerCase()">{{ category }}</option>
          </select>
        </label>

        <label class="form-field">
          <span>Price</span>
          <input type="number" name="price" [(ngModel)]="product.price" required min="0.01" step="0.01"
            placeholder="0.00" />
        </label>
      </div>

      <div class="upload-field">
        <label>Product image</label>
        @if (!imagePreview()) {
        <label class="upload-dropzone">
          <i class="fa fa-cloud-arrow-up"></i>
          <span>Click to upload an image</span>
          <small>JPG, PNG, or WebP</small>
          <input type="file" accept="image/*" (change)="onImageSelected($event)" class="hidden" />
        </label>
        }

        @if (imagePreview()) {
        <div class="image-preview">
          <img [src]="imagePreview()" alt="Selected product preview" />
          <button type="button" (click)="removeImage()" aria-label="Remove selected image">
            <i class="fa fa-trash"></i>
          </button>
        </div>
        }
      </div>

      <div class="modal-actions">
        <button type="button" (click)="close()" class="btn-secondary">Close</button>
        <button type="submit" [disabled]="productForm.invalid || !imagePreview()" class="btn-primary">
          <i class="fa fa-check"></i>
          Create
        </button>
      </div>
    </form>
  </section>
</div>
