<div class="fixed inset-0 bg-accent/40 backdrop-blur-sm flex items-center justify-center z-[1000] p-4" (click)="close()">
  <!-- Modal -->
  <div class="bg-white rounded-2xl shadow-elevation-premium w-full max-w-2xl overflow-hidden border border-primary/10" (click)="$event.stopPropagation()">
    <!-- Header Decor -->
    <div class="h-2 bg-primary"></div>
    
    <div class="p-8 md:p-12">
      <div class="flex justify-between items-center mb-8">
        <div>
          <app-badge variant="primary" class="mb-2">New Creation</app-badge>
          <app-typography variant="h3" [serif]="true" customClass="text-accent">Add to the Collection</app-typography>
        </div>
        <button (click)="close()" class="text-accent/40 hover:text-primary transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

      <form (ngSubmit)="createProduct()" #productForm="ngForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Product Name -->
          <div class="space-y-2">
            <app-typography variant="caption" customClass="uppercase tracking-widest font-black text-primary">Craft Name</app-typography>
            <input type="text" name="name" [(ngModel)]="product.name" required placeholder="e.g., Fez Blue Vase"
              class="w-full px-4 py-3 rounded-lg border border-primary/10 bg-background/30 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-sans text-accent" />
          </div>

          <!-- Price -->
          <div class="space-y-2">
            <app-typography variant="caption" customClass="uppercase tracking-widest font-black text-primary">Price (MAD)</app-typography>
            <input type="number" name="price" [(ngModel)]="product.price" required min="0" step="0.01" placeholder="0.00"
              class="w-full px-4 py-3 rounded-lg border border-primary/10 bg-background/30 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-sans text-accent" />
          </div>
        </div>

        <!-- Description -->
        <div class="space-y-2">
          <app-typography variant="caption" customClass="uppercase tracking-widest font-black text-primary">The Artisan's Tale (Description)</app-typography>
          <textarea name="description" [(ngModel)]="product.description" required rows="4" placeholder="Describe the materials, technique, and soul of this piece..."
            class="w-full px-4 py-3 rounded-lg border border-primary/10 bg-background/30 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-sans text-accent"></textarea>
        </div>

        <!-- Image Upload -->
        <div class="space-y-2">
          <app-typography variant="caption" customClass="uppercase tracking-widest font-black text-primary">Visual Soul (Image)</app-typography>
          
          @if (!imagePreview()) {
            <label class="w-full h-48 flex flex-col items-center justify-center border-2 border-dashed border-primary/10 rounded-xl cursor-pointer bg-background/30 hover:bg-background/50 transition-all text-accent/40 hover:text-primary group">
              <svg class="w-10 h-10 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              <span class="text-sm font-semibold">Capture the Beauty</span>
              <input type="file" accept="image/*" (change)="onImageSelected($event)" class="hidden" />
            </label>
          }

          <!-- Preview -->
          @if (imagePreview()) {
            <div class="relative rounded-xl overflow-hidden shadow-sm border border-primary/5">
              <img [src]="imagePreview()" class="w-full h-48 object-cover" />
              <button type="button" (click)="removeImage()"
                class="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full hover:bg-red-600 transition-colors shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
          }
        </div>

        <!-- Buttons -->
        <div class="flex justify-end gap-4 pt-4 border-t border-primary/5">
          <app-button type="button" variant="outline" size="md" (onClick)="close()">Cancel</app-button>
          <app-button type="submit" [disabled]="productForm.invalid || !imagePreview()" size="md">Commence Creation</app-button>
        </div>
      </form>
    </div>
  </div>
</div>
