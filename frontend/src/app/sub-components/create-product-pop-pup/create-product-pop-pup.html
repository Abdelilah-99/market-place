<div class="fixed inset-0 bg-accent/50 backdrop-blur-sm flex items-center justify-center z-[1000] p-4" (click)="close()">
  <!-- Modal -->
  <div class="bg-surface rounded-sm shadow-elevation-premium w-full max-w-2xl max-h-[92vh] overflow-y-auto border border-line" (click)="$event.stopPropagation()">
    <!-- Header Decor -->
    <div class="h-1 bg-primary"></div>

    <div class="p-6 md:p-10">
      <div class="flex justify-between items-start mb-8">
        <div>
          <span class="eyebrow text-primary">New Creation</span>
          <app-typography variant="h3" [serif]="true" customClass="text-accent mt-2">Add to the Collection</app-typography>
        </div>
        <button (click)="close()" aria-label="Close" class="text-muted hover:text-primary transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

      <form (ngSubmit)="createProduct()" #productForm="ngForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Product Name -->
          <div class="space-y-2">
            <label class="eyebrow text-accent block">Craft Name</label>
            <input type="text" name="name" [(ngModel)]="product.name" required placeholder="e.g., Fez Blue Vase"
              class="w-full px-4 py-3 rounded-sm border border-line bg-background focus:outline-none focus:border-primary/50 transition-all font-sans text-sm text-accent placeholder:text-muted" />
          </div>

          <!-- Price -->
          <div class="space-y-2">
            <label class="eyebrow text-accent block">Price (MAD)</label>
            <input type="number" name="price" [(ngModel)]="product.price" required min="0" step="0.01" placeholder="0.00"
              class="w-full px-4 py-3 rounded-sm border border-line bg-background focus:outline-none focus:border-primary/50 transition-all font-sans text-sm text-accent placeholder:text-muted" />
          </div>
        </div>

        <!-- Description -->
        <div class="space-y-2">
          <label class="eyebrow text-accent block">The Artisan's Tale (Description)</label>
          <textarea name="description" [(ngModel)]="product.description" required rows="4" placeholder="Describe the materials, technique, and soul of this piece..."
            class="w-full px-4 py-3 rounded-sm border border-line bg-background focus:outline-none focus:border-primary/50 transition-all font-sans text-sm text-accent placeholder:text-muted"></textarea>
        </div>

        <!-- Image Upload -->
        <div class="space-y-2">
          <label class="eyebrow text-accent block">Visual Soul (Image)</label>

          @if (!imagePreview()) {
            <label class="w-full h-48 flex flex-col items-center justify-center border border-dashed border-line rounded-sm cursor-pointer bg-background hover:bg-accent/5 transition-all text-muted hover:text-primary group">
              <svg class="w-10 h-10 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              <span class="text-sm font-semibold">Capture the Beauty</span>
              <input type="file" accept="image/*" (change)="onImageSelected($event)" class="hidden" />
            </label>
          }

          <!-- Preview -->
          @if (imagePreview()) {
            <div class="relative rounded-sm overflow-hidden border border-line">
              <img [src]="imagePreview()" alt="Product preview" class="w-full h-48 object-cover" />
              <button type="button" (click)="removeImage()" aria-label="Remove image"
                class="absolute top-2 right-2 bg-primary text-white p-1.5 rounded-full hover:bg-primary-dark transition-colors shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
          }
        </div>

        <!-- Buttons -->
        <div class="flex justify-end gap-4 pt-4 border-t border-line">
          <app-button type="button" variant="outline" size="md" (onClick)="close()">Cancel</app-button>
          <app-button type="submit" [disabled]="productForm.invalid || !imagePreview()" size="md">Commence Creation</app-button>
        </div>
      </form>
    </div>
  </div>
</div>
