services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buy01-jenkins
    networks:
      - shared-net
    restart: unless-stopped
    ports:
      - "8089:8080"
      - "50000:50000"
      - "5006:5006"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../:/var/jenkins_home/workspace/buy-01

volumes:
  jenkins_home:
networks:
  shared-net:
    external: true