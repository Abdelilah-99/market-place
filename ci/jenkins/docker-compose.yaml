services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-989}
    container_name: buy01-jenkins
    group_add:
      - "${DOCKER_GID:-989}"
    networks:
      - shared-net
    restart: unless-stopped
    ports:
      - "8089:8080"
      - "50000:50000"
      - "5006:5006"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # - ../../:/var/jenkins_home/workspace/buy01

volumes:
  jenkins_home:
networks:
  shared-net:
    external: true
