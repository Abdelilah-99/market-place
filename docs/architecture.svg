<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Buy01 Marketplace architecture</title>
  <desc id="desc">Architecture showing Angular and Caddy, Spring Cloud Gateway, Eureka-discovered microservices, Stripe, Kafka, MongoDB, OpenSearch, Redis, observability, Jenkins, and secured certificate volumes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081426"/><stop offset="1" stop-color="#12233d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>
      .title{font:700 34px Inter,Arial,sans-serif;fill:#f8fafc}.sub{font:16px Inter,Arial,sans-serif;fill:#94a3b8}
      .h{font:700 18px Inter,Arial,sans-serif;fill:#f8fafc}.t{font:14px Inter,Arial,sans-serif;fill:#cbd5e1}.small{font:12px Inter,Arial,sans-serif;fill:#94a3b8}
      .box{rx:16;filter:url(#shadow);stroke-width:1.5}.flow{fill:none;stroke:#7dd3fc;stroke-width:2.2;marker-end:url(#arrow)}
      .event{fill:none;stroke:#fbbf24;stroke-width:2;stroke-dasharray:8 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="60" y="62" class="title">Buy01 Marketplace</text>
  <text x="60" y="91" class="sub">Secure event-driven microservices • Angular • Spring Boot • Stripe • Kafka • OpenSearch</text>

  <rect x="60" y="130" width="250" height="110" class="box" fill="#172554" stroke="#60a5fa"/>
  <text x="85" y="165" class="h">Web Client</text><text x="85" y="194" class="t">Angular storefront</text><text x="85" y="218" class="small">Caddy • HTTPS • runtime API config</text>
  <rect x="410" y="130" width="300" height="110" class="box" fill="#164e63" stroke="#22d3ee"/>
  <text x="435" y="165" class="h">Spring Cloud Gateway</text><text x="435" y="194" class="t">JWT • RBAC • CORS • rate limiting</text><text x="435" y="218" class="small">Eureka load balancing • HTTPS/mTLS</text>
  <rect x="810" y="130" width="240" height="110" class="box" fill="#3f2b10" stroke="#fbbf24"/>
  <text x="835" y="165" class="h">Eureka</text><text x="835" y="194" class="t">Service registry</text><text x="835" y="218" class="small">users • products • media • payments</text>
  <rect x="1130" y="130" width="210" height="110" class="box" fill="#3b1d45" stroke="#c084fc"/>
  <text x="1155" y="165" class="h">Redis</text><text x="1155" y="194" class="t">Distributed token bucket</text><text x="1155" y="218" class="small">5 req/s • burst 10</text>

  <path d="M310 185 H410" class="flow"/><path d="M710 170 H810" class="flow"/><path d="M710 215 C900 285 1110 255 1160 240" class="flow"/>

  <text x="60" y="300" class="h">Domain services</text>
  <rect x="60" y="330" width="285" height="150" class="box" fill="#183c34" stroke="#34d399"/>
  <text x="85" y="366" class="h">Users Service :8080</text><text x="85" y="395" class="t">Auth • profiles • admin • search</text><text x="85" y="422" class="small">RSA JWT issuer • MongoDB</text><text x="85" y="448" class="small">OpenSearch user projection</text>
  <rect x="385" y="330" width="285" height="150" class="box" fill="#183c34" stroke="#34d399"/>
  <text x="410" y="366" class="h">Products Service :8000</text><text x="410" y="395" class="t">Catalog • ratings • seller/admin</text><text x="410" y="422" class="small">MongoDB source of truth</text><text x="410" y="448" class="small">Kafka-indexed OpenSearch search</text>
  <rect x="710" y="330" width="285" height="150" class="box" fill="#183c34" stroke="#34d399"/>
  <text x="735" y="366" class="h">Media Service :8888</text><text x="735" y="395" class="t">Product images • avatars</text><text x="735" y="422" class="small">MongoDB metadata • filesystem</text><text x="735" y="448" class="small">Event-driven lifecycle cleanup</text>
  <rect x="1035" y="330" width="305" height="150" class="box" fill="#312e81" stroke="#818cf8"/>
  <text x="1060" y="366" class="h">Payments Service :8010</text><text x="1060" y="395" class="t">Stripe Checkout Sessions</text><text x="1060" y="422" class="small">Product/buyer metadata • return URLs</text><text x="1060" y="448" class="small">Secret injected by Jenkins</text>

  <path d="M560 240 V275 H202 V330" class="flow"/><path d="M560 275 H527 V330" class="flow"/><path d="M560 275 H852 V330" class="flow"/><path d="M560 275 H1187 V330" class="flow"/>
  <rect x="1090" y="540" width="250" height="105" class="box" fill="#312e81" stroke="#a78bfa"/>
  <text x="1115" y="576" class="h">Stripe</text><text x="1115" y="605" class="t">Hosted Checkout • public HTTPS</text><text x="1115" y="628" class="small">Test/live API keys</text>
  <path d="M1187 480 V540" class="flow"/>

  <rect x="60" y="550" width="610" height="115" class="box" fill="#422006" stroke="#f59e0b"/>
  <text x="85" y="585" class="h">Kafka Event Backbone</text><text x="85" y="614" class="t">User/product lifecycle • media confirmation/deletion • search synchronization</text><text x="85" y="640" class="small">Asynchronous integration and rebuildable read models</text>
  <path d="M202 480 V550" class="event"/><path d="M527 480 V550" class="event"/><path d="M852 480 C852 525 650 525 620 550" class="event"/>
  <rect x="710" y="550" width="320" height="115" class="box" fill="#3b2314" stroke="#fb923c"/>
  <text x="735" y="585" class="h">OpenSearch</text><text x="735" y="614" class="t">Products + users full-text indexes</text><text x="735" y="640" class="small">Fuzzy search • filters • sort • reindex</text>
  <path d="M670 607 H710" class="event"/>

  <rect x="60" y="735" width="380" height="110" class="box" fill="#1e293b" stroke="#64748b"/>
  <text x="85" y="770" class="h">Jenkins CI/CD</text><text x="85" y="799" class="t">Maven/Gradle tests • ordered deploy • rollback</text><text x="85" y="825" class="small">Credentials injection • Docker cleanup • reports</text>
  <rect x="510" y="735" width="380" height="110" class="box" fill="#1e293b" stroke="#64748b"/>
  <text x="535" y="770" class="h">Security & Secrets</text><text x="535" y="799" class="t">JWT RSA • RBAC • per-service PKCS12 • mTLS</text><text x="535" y="825" class="small">External certificate volumes • ignored env files</text>
  <rect x="960" y="735" width="380" height="110" class="box" fill="#1e293b" stroke="#64748b"/>
  <text x="985" y="770" class="h">Observability & Runtime</text><text x="985" y="799" class="t">Prometheus • Grafana • Actuator • exporters</text><text x="985" y="825" class="small">Docker Compose • shared-net • cloud VM</text>
</svg>
