services:
  products-service-mongodb:
    build: ./database
    container_name: products-service-mongodb
    env_file:
      - .env.product
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net
    logging: &bounded-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  products-service:
    build:
      context: ../
      dockerfile: products-service/products/Dockerfile
    container_name: products-service
    env_file:
      - .env.product

    depends_on:
      - products-service-mongodb
    volumes:
      - products-service-certs:/app/resources/certs:ro
    networks:
      - shared-net
    logging: *bounded-logging

volumes:
  mongo_data:
  products-service-certs:
    external: true

networks:
  shared-net:
    external: true
