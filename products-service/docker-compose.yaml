services:
  products-service-mongodb:
    build: ./database
    container_name: products-service-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:DB}
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net

  products-service:
    build:
      context: ../
      dockerfile: products-service/products/Dockerfile
    container_name: products-service
    ports:
      - "8000:8000"
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DISCOVERY : http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: -Djavax.net.ssl.trustStore=/app/resources/certs/truststore.p12 -Djavax.net.ssl.trustStorePassword=${TRUST_STORE_PWD} -Djavax.net.ssl.trustStoreType=${KEY_STORE_TYPE:PKCS12} -Djavax.net.ssl.keyStore=/app/resources/certs/users-service.p12 -Djavax.net.ssl.keyStorePassword=${KEY_STORE_PWD} -Djavax.net.ssl.keyStoreType=${KEY_STORE_TYPE:PKCS12}

    depends_on:
      - products-service-mongodb
    volumes:
      - backend_m2:/root/.m2
      - ./certs/products-service.p12:/app/resources/certs/products-service.p12:ro
      - ./certs/truststore.p12:/app/resources/certs/truststore.p12:ro
    networks:
      - shared-net

volumes:
  mongo_data:
  backend_m2:

networks:
  shared-net:
    external: true
