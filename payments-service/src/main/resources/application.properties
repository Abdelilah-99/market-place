spring.application.name=payments
server.port=8010

stripe.secret-key=${STRIPE_SECRET_KEY:}
app.public-url=${APP_PUBLIC_URL:http://localhost:4200}

eureka.client.service-url.defaultZone=${DISCOVERY:http://eureka-server:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=payments-service
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=${server.port}

server.ssl.enabled=true
server.ssl.key-store=${CERTIFICATE_PATH:file:/app/resources/certs/payments-service.p12}
server.ssl.key-store-password=${KEY_STORE_PWD}
server.ssl.key-store-type=${KEY_STORE_TYPE:PKCS12}
server.ssl.trust-store=${TRUSTSTORE_PATH:file:/app/resources/certs/truststore.p12}
server.ssl.trust-store-password=${TRUST_STORE_PWD}
server.ssl.client-auth=need

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=payments-service
