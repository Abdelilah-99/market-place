spring.application.name=payments
server.port=8010

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.public-url=${APP_PUBLIC_URL:http://localhost:4200}
products.base-url=${PRODUCTS_BASE_URL:https://products-service:8000}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://payments-service-mongodb:27017/payments}
spring.data.mongodb.auto-index-creation=true
orders.retention.cancelled-days=${CANCELLED_ORDER_RETENTION_DAYS:30}
orders.retention.paid-days=${PAID_ORDER_RETENTION_DAYS:365}
orders.retention.cron=${ORDER_RETENTION_CRON:0 20 3 * * *}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

eureka.client.service-url.defaultZone=${DISCOVERY:http://eureka-server:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=payments-service
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=${server.port}

server.ssl.enabled=true
server.ssl.key-store=${CERTIFICATE_PATH:file:/app/resources/certs/payments-service.p12}
server.ssl.key-store-password=${KEY_STORE_PWD}
server.ssl.key-store-type=${KEY_STORE_TYPE:PKCS12}
server.ssl.trust-store=${TRUSTSTORE_PATH:file:/app/resources/certs/truststore.p12}
server.ssl.trust-store-password=${TRUST_STORE_PWD}
server.ssl.client-auth=need

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=payments-service
management.observations.key-values.service=payments-service
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.client.requests=true
management.metrics.distribution.percentiles-histogram.marketplace.payment.checkout=true
