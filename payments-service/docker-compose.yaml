services:
  payments-service-mongodb:
    image: mongo:7
    container_name: payments-service-mongodb
    restart: on-failure
    volumes:
      - payments_mongo_data:/data/db
    networks:
      - shared-net
    logging: &bounded-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  payments-service:
    build:
      context: ..
      dockerfile: payments-service/Dockerfile
    container_name: payments-service
    restart: on-failure
    depends_on:
      - payments-service-mongodb
    env_file:
      - .env.payments
    environment:
      # Keep Java's default public CA bundle for outbound HTTPS calls to Stripe.
      # Inbound mTLS still uses the Spring server.ssl.* paths from .env.payments.
      JAVA_TOOL_OPTIONS: ""
      PRODUCTS_BASE_URL: https://products-service:8000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_URI: mongodb://payments-service-mongodb:27017/payments
    volumes:
      - payments-service-certs:/app/resources/certs:ro
    networks:
      - shared-net
    logging: *bounded-logging

networks:
  shared-net:
    external: true

volumes:
  payments_mongo_data:
  payments-service-certs:
    external: true
