services:
  payments-service:
    build:
      context: ..
      dockerfile: payments-service/Dockerfile
    container_name: payments-service
    restart: on-failure
    env_file:
      - ../gateway/.env.gateway
    environment:
      DISCOVERY: ${DISCOVERY:-http://eureka-server:8761/eureka}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://marketplace.bouchikhi.com}
      CERTIFICATE_PATH: file:/app/resources/certs/payments-service.p12
      TRUSTSTORE_PATH: file:/app/resources/certs/truststore.p12
    volumes:
      - payments-service-certs:/app/resources/certs:ro
    networks:
      - shared-net

networks:
  shared-net:
    external: true

volumes:
  payments-service-certs:
    external: true
