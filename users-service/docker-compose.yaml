services:
  user-mongodb:
    image: mongo:4.4
    container_name: user-mongodb
    env_file:
      - .env.users
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net
    logging: &bounded-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  users-service:
    build: 
      context: ..
      dockerfile: users-service/service/dockerfile
    restart: on-failure
    container_name: users-service
    env_file:
      - .env.users

    networks:
      - shared-net
    depends_on:
        - user-mongodb
    volumes:
      - users-service-certs:/app/resources/certs:ro
    working_dir: /app
    logging: *bounded-logging
volumes:
  mongo_data:
  users-service-certs:
    external: true
networks:
  shared-net:
    external: true
