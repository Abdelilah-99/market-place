spring.application.name=users
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# Debug logging
logging.level.root=INFO
logging.level.com.buy01.users=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Kafka bootstrap servers (adjust host/port if necessary)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
jwt.private-key=classpath:keys/private.pem

# tomcat settings
server.port=8080

# eureka
eureka.client.service-url.defaultZone=${DISCOVERY}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=users-service
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=${server.port}
server.ssl.enabled=true
server.ssl.key-store-password=${KEY_STORE_PWD}
server.ssl.key-store-type=${KEY_STORE_TYPE}

# For mTLS — require client cert from gateway
server.ssl.client-auth=need
server.ssl.key-store=${CERTIFICATE_PATH}
server.ssl.trust-store=${TRUSTSTORE_PATH}
server.ssl.trust-store-password=${TRUST_STORE_PWD}
